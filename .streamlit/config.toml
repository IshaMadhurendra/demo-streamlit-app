# Pin the theme so the app looks the same regardless of the viewer's
# OS / browser light/dark preference. Also picked up by Streamlit
# Community Cloud on deploy.
[theme]
base = "light"
primaryColor = "#29B5E8"
# Pale Snowflake-blue tint for the main chat surface.
backgroundColor = "#EEF6FC"
# Sidebar & secondary containers — a touch lighter so they read as
# distinct but still on-palette.
secondaryBackgroundColor = "#F6FBFE"
textColor = "#111827"
font = "sans serif"
